<div class="dialog-container">
  <div class="dialog-header">
    <div class="dialog-header-left">
      <mat-icon class="dialog-header-icon">person_add</mat-icon>
      <h2 class="dialog-header-title">{{ 'addCustomer' | translate }}</h2>
    </div>
    <button mat-icon-button class="dialog-close-btn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div mat-dialog-content class="dialog-body">
    <form [formGroup]="newCustomerForm" class="dialog-form">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'customerName' | translate }}</mat-label>
          <input matInput formControlName="name" placeholder="Enter customer name">
          <mat-icon matPrefix>business</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'erpCustomerID' | translate }}</mat-label>
          <input matInput formControlName="erpCustomerId" placeholder="e.g. KNO8068">
          <mat-icon matPrefix>badge</mat-icon>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'marketPlace' | translate }}</mat-label>
          <input matInput formControlName="marketplace" placeholder="e.g. Mirakl, Target Plus, Amazon">
          <mat-icon matPrefix>storefront</mat-icon>
        </mat-form-field>
      </div>
    </form>
  </div>

  <div mat-dialog-actions class="dialog-footer">
    <button mat-raised-button class="btn-save" [disabled]="!newCustomerForm.valid" (click)="onSave()">
      <mat-icon>save</mat-icon> {{ 'save' | translate }}
    </button>
  </div>
</div>
