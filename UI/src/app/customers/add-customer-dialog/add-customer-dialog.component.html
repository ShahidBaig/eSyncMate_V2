<div mat-dialog-content class="dialog-content">
  <h1 class="dialog-title">{{ 'addCustomer' | translate }}</h1>
  <form [formGroup]="newCustomerForm" class="customer-form">

    <!-- Row 1: Customer Name and ERP Customer ID -->
    <div class="form-row">
      <mat-form-field class="form-field">
        <mat-label>{{ 'customerName' | translate }}</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>

      <mat-form-field class="form-field">
        <mat-label>{{ 'erpCustomerID' | translate }}</mat-label>
        <input matInput formControlName="erpCustomerId">
      </mat-form-field>
    </div>

    <!-- Row 2: Marketplace -->
    <div class="form-row">
      <mat-form-field class="form-field full-width">
        <mat-label>{{ 'marketPlace' | translate }}</mat-label>
        <input matInput formControlName="marketplace">
      </mat-form-field>
    </div>
  </form>
</div>

<div mat-dialog-actions class="dialog-actions">
  <button mat-button class="cancel-button" (click)="onCancel()">{{ 'cancel' | translate }}</button>
  <button mat-raised-button color="primary" [disabled]="!newCustomerForm.valid" (click)="onSave()">{{ 'save' | translate }}</button>
</div>
