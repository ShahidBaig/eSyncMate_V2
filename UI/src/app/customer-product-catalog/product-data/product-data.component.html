<div class="dialog-container">
  <div class="dialog-header">
    <div class="dialog-header-left">
      <mat-icon class="dialog-header-icon">description</mat-icon>
      <h2 class="dialog-header-title">{{ 'product' | translate }} [{{ currentItemID }}] {{ 'data' | translate }}</h2>
    </div>
    <button mat-icon-button class="dialog-close-btn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div mat-dialog-content class="dialog-body">
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="data-table">

        <ng-container matColumnDef="Type">
          <th mat-header-cell *matHeaderCellDef>{{ 'type' | translate }}</th>
          <td mat-cell *matCellDef="let element">
            <span class="type-text">{{ element.type }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="CreatedDate">
          <th mat-header-cell *matHeaderCellDef>{{ 'createdDate' | translate }}</th>
          <td mat-cell *matCellDef="let element">{{ element.createdDate | date:'MM/dd/yyyy hh:mm a' }}</td>
        </ng-container>

        <ng-container matColumnDef="fileName">
          <th mat-header-cell *matHeaderCellDef>{{ 'fileName' | translate }}</th>
          <td mat-cell *matCellDef="let element">
            <span class="file-name">{{ element.fileName }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="DownloadFile">
          <th mat-header-cell *matHeaderCellDef>{{ 'actions' | translate }}</th>
          <td mat-cell *matCellDef="let element">
            <div class="action-buttons">
              <button mat-icon-button class="download-btn" [disabled]="showSpinner"
                      matTooltip="Download File" (click)="downloadFile(element.productId, element.fileName, element.type)">
                <mat-icon>save_alt</mat-icon>
              </button>
              <button mat-icon-button class="view-btn"
                      matTooltip="View File" (click)="viewFile(element.productId, element.fileName, element.type, element.id)">
                <mat-icon>visibility</mat-icon>
                <mat-spinner *ngIf="isLoading(element.productId)" diameter="20"></mat-spinner>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </div>
</div>
